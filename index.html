<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <style>
    :root {
      --gold:       #fc1484;
      --gold-light: #fd7cba;
      --cream:      #1b1353;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(160deg, #1b1353 0%, #2a1060 100%);
      color: #fff;
    }
    .box { max-width: 480px; }
    .icon { font-size: 2.4rem; margin-bottom: 18px; }
    h1 {
      font-family: 'League Spartan', sans-serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      margin-bottom: 14px;
    }
    h1 span { color: var(--gold-light); }
    .badge {
      display: inline-block; background: rgba(252,20,132,.2);
      border: 1px solid rgba(253,124,186,.5); border-radius: 100px;
      padding: 5px 16px; font-size: .68rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase; margin-bottom: 18px;
    }
    p {
      font-size: .92rem; font-weight: 300; line-height: 1.7;
      color: rgba(255,255,255,.8); margin-bottom: 28px;
    }
    .btn {
      display: inline-block; background: var(--gold); color: #fff;
      padding: 13px 36px; font-size: .78rem; font-weight: 600;
      letter-spacing: .07em; text-transform: uppercase;
      text-decoration: none; border-radius: 100px; transition: all .2s;
    }
    .btn:hover { background: var(--gold-light); transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🔒</div>

    <p>Esta edición del curso ya comenzó. Si querés saber la próxima fecha o anotarte en lista de espera, escribime por WhatsApp.</p>
